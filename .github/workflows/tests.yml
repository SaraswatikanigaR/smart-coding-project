name: Full Stack CI

on:
  push:
    branches: [ "main", "active-learning", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci
      
      - name: Run Frontend Tests
        run: |
          cd frontend
          npm test -- --run # The --run flag tells Vitest to exit after finishing

  backend-tests:
    runs-on: ubuntu-latest
    # This spins up a real Postgres DB for your backend tests!
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      
      - name: Install Backend Dependencies
        run: |
          cd backend
          npm ci
      
      - name: Run Backend Tests
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/test_db
          NODE_ENV: test  # Ensure SSL is turned off by our db.js logic
        run: |
          cd backend
          npm test